  <ellipse cx="364" cy="198" rx="62" ry="76" fill="#fda4af" stroke="#fb7185" strokeWidth="8"/>
  <ellipse cx="148" cy="201" rx="36" ry="50" fill="#f472b6"/>
  <ellipse cx="364" cy="201" rx="36" ry="50" fill="#f472b6"/>

